name: "Release Tauri App"

on:
  push:
    tags:
      - "v*" # GitHub에 v1.0.0 같은 형태의 태그를 푸시할 때만 실행됩니다.
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v5

      - name: 공통 CI 환경 준비
        uses: ./.github/actions/setup-ci

      - name: TypeScript 타입 체크
        run: ./node_modules/.bin/tsc --noEmit

      - name: Rust 체크
        run: cargo check --manifest-path src-tauri/Cargo.toml

  test:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v5

      - name: 공통 CI 환경 준비
        uses: ./.github/actions/setup-ci

      - name: 프론트엔드 테스트 실행
        run: npm run test

      - name: Rust 테스트 실행
        run: npm run test:rust

  build:
    runs-on: ubuntu-latest
    needs: [check, test]
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v5

      - name: 공통 CI 환경 준비
        uses: ./.github/actions/setup-ci
        with:
          install_rust: "false"
          install_linux_tauri_deps: "false"

      - name: 프런트엔드 빌드
        run: npm run build

  publish-tauri:
    needs: [check, test, build]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS는 universal로 빌드 (Apple Silicon / Intel 모두 지원)
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "windows-latest"
            args: ""
          - platform: "ubuntu-22.04"
            args: ""

    runs-on: ${{ matrix.platform }}
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v5

      - name: 공통 JS 환경 준비
        uses: ./.github/actions/setup-js

      - name: Rust 설치
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.args, '--target') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust 캐시 설정 (빌드 속도 향상)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: 리눅스 필수 의존성 패키지 설치 (우분투)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: macOS 배포 서명 설정 확인
        if: matrix.platform == 'macos-latest'
        run: |
          missing=0
          for name in APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD KEYCHAIN_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "macOS release builds require Apple signing and notarization secrets."
            exit 1
          fi

      - name: Apple Developer 인증서 가져오기 (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -n 1 || true)
          if [ -z "$CERT_INFO" ]; then
            echo "Developer ID Application certificate not found in keychain."
            security find-identity -v -p codesigning build.keychain
            exit 1
          fi

          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"

      - name: Tauri 앱 빌드 및 GitHub Release 배포
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ env.APPLE_ID }}
          APPLE_PASSWORD: ${{ env.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE: ${{ env.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ env.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        with:
          # package.json version과 동일한 v* 태그 규칙을 유지합니다.
          tagName: v__VERSION__
          releaseName: "MyCommander v__VERSION__"
          releaseBody: "자동으로 빌드된 MyCommander 설치 파일(윈도우, 맥, 리눅스)입니다."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
