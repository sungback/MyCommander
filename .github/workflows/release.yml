name: "Release Tauri App"

on:
  push:
    tags:
      - "v*" # GitHub에 v1.0.0 같은 형태의 태그를 푸시할 때만 실행됩니다.

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 의존성 설치
        run: npm install

      - name: 프론트엔드 테스트 실행
        run: npm run test

  publish-tauri:
    needs: test
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # 윈도우, 맥, 리눅스(우분투)에서 동시에 돌아가도록 설정합니다.
          - platform: "macos-latest"
            args: ""
          - platform: "windows-latest"
            args: ""
          - platform: "ubuntu-22.04"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust 설치
        uses: dtolnay/rust-toolchain@stable

      - name: Rust 캐시 설정 (빌드 속도 향상)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: 리눅스 필수 의존성 패키지 설치 (우분투)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: 웹 프론트엔드 의존성 설치 (npm)
        run: npm install

      - name: Tauri 앱 빌드 및 GitHub Release 배포
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # package.json의 version을 읽어서 자동으로 태그/타이틀을 만듭니다.
          tagName: app-v__VERSION__ 
          releaseName: "MyCommander v__VERSION__"
          releaseBody: "자동으로 빌드된 MyCommander 설치 파일(윈도우, 맥, 리눅스)입니다."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
