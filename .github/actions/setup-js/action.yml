name: Setup JS Environment
description: Checkout the repository and install JavaScript dependencies.

runs:
  using: composite
  steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v4

    - name: Node.js 설치
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: "npm"

    - name: 의존성 설치
      shell: bash
      run: npm ci
